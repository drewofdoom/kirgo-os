# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
---
type: dnf
repos:
  files:
    - "https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo"
  keys:
    - https://repos.fyralabs.com/terra44/key.asc
  copr:
    - ulysg/xwayland-satellite
install:
  exclude:
    - swaylock
    - alacritty
    - fuzzel
    - waybar
  packages:
    - bibata-cursor-theme
    - cava
    - ghostty
    - ghostty-fish-completion
    - ghostty-nautilus
    - ghostty-shell-integration
    - ghostty-terminfo
    - nautilus
    - niri
    - noctalia
    - noctalia-greeter
    - nwg-look
    - papirus-icon-theme
    - podman-compose
    - podman-machine
    - podman-tui
    - util-linux
    - xwayland-run
    - xwayland-satellite
remove:
  auto-remove: true
  packages:
    - antiword
    - epiphany-runtime
    - evolution-data-server
    - evolution-ews-core
    - evolution-ews-langpacks
    - gdm
    - gnome-bluetooth
    - gnome-color-manager
    - gnome-control-center
    - gnome-disk-utility
    - gnome-initial-setup
    - gnome-online-accounts
    - gnome-online-accounts-libs
    - gnome-remote-desktop
    - gnome-session
    - gnome-session-wayland-session
    - gnome-shell
    - gnome-shell-extension-apps-menu
    - gnome-shell-extension-common
    - gnome-shell-extension-launch-new-instance
    - gnome-shell-extension-places-menu
    - gnome-shell-extension-window-list
    - gnome-tour
    - gnome-user-docs
    - mutter
    - orca
    - ptyxis
    - rygel
...
